<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="expires" content="604800">
    <meta name="format-detection" content="email=no,telephone=no,address=no">
    <title>株式会社○○○○○○○</title>
    <meta name="description" content="株式会社○○○○○○の企業サイトです">
    <link rel="icon" href="assets/images/favicon.ico">
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <main class="l-main">
      <div class="p-catalog">
        <h1 class="c-title">-Catalog-</h1>
        <div class="p-catalog__content">
          <h2 class="c-heading">PickUp</h2>
          <!-- pick upはここから -->
          <div class="p-catalog__info">
            <div class="c-image">
              <img src="assets/images/lesson2/img_pickup.jpg" alt="スマートウォッチ画像">
            </div>

            <div class="p-catalog__detail">
              <h3 class="c-card-title">
              スマートウォッチ
                <img class="c-image--small" src ="assets/images/lesson2/logo_pickup.png" alt="カート">
              </h3>
              <p class="p-catalog__description">洗練されたデザインと最先端の機能を兼ね備えたスマートウォッチです。</p>

              <p class="p-catalog__specs">
                <span class="p-catalog__spec">カラー：モカグレー</span>
                <span class="p-catalog__spec">サイズ：S/M/L</span>
                <span class="p-catalog__spec">バッテリー：最大7日間</span>
                <span class="p-catalog__spec">充電時間：約２時間</span>
              </p>

              <p class="p-catalog__price">
                <span class="p-catalog__yen">&yen;</span>
                <span class="p-catalog__value">19,800</span>
                <span class="p-catalog__tax">(税込)</span>
              </p>

              <ul class="p-catalog__tags">
                <li><a class="c-tag" href="">#おしゃれ</a></li>
                <li><a class="c-tag" href="">#シンプル</a></li>
                <li><a class="c-tag" href="">#普段使い</a></li>
              </ul>
            </div><!-- p-catalog__detail close-->
          </div><!-- p-catalog__info close -->
        </div><!-- p-catalog__content close -->
      </div><!-- p-catalog close -->
    </main><!-- l-main close -->
  </body>
